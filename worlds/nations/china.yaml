nation: china
label: 中国
language: zh
currency: 人民币

decades:
  1980s:
    era_label: 改革开放初期
    economic_trend: >
      分田到户，市场开始松动。城乡收入差距扩大。
      万元户是新闻事件。现金极其稀缺，以物换物未消失。
      外资进入沿海，深圳是一个实验。
    cultural_trend: >
      文革记忆还在，但人们开始向前看。
      港台流行文化通过磁带和录像带传入。
      读书热——高考恢复，知识改变命运重新成立。
    major_events:
      - 1978 改革开放正式启动
      - 1984 城市经济体制改革
      - 1989 天安门事件
    background_noise: >
      收音机和样板戏记忆。土地是最重要的东西。
      城里人是另一个物种，但有人开始变成城里人。
    empty_notes: 农村地区数据不完整

  1990s:
    era_label: 经济腾飞与分化
    economic_trend: >
      国企改革，大批工人下岗。私营经济崛起。
      沿海城市和内地差距急剧扩大。
      股市开设，投机文化萌芽。
    cultural_trend: >
      消费主义开始渗透城市。港台偶像剧和歌曲是共同语言。
      个体户和"下海"是主要叙事。
      互联网在末期刚刚出现在城市边缘。
    major_events:
      - 1992 南巡讲话，改革加速
      - 1997 香港回归
      - 1998 亚洲金融危机，国企大规模改制
    background_noise: >
      BP机，BB机，后来是大哥大。
      下岗潮的焦虑和创业热情同时存在。

  2000s:
    era_label: 高速增长与城镇化
    economic_trend: >
      加入WTO，出口驱动高速增长。城镇化加速，农民工潮。
      房价开始上涨，但尚在可接受范围。
      中产阶级初步形成，消费升级开始。
    cultural_trend: >
      互联网进入日常，QQ是主要社交工具。
      超女、快男，大众娱乐民主化。
      80后成为话题，个人主义与集体主义摩擦。
    major_events:
      - 2001 加入WTO
      - 2003 非典
      - 2008 北京奥运会，四川地震
    background_noise: >
      手机是奢侈品到必需品的过渡。网吧是年轻人的聚集地。
      考大学仍是改变命运的主要叙事。

  2010s:
    era_label: 移动互联网与焦虑
    economic_trend: >
      移动互联网重塑日常经济。外卖、滴滴、移动支付。
      房价高到让人麻木，尤其一线城市。
      996是工作常态，中产焦虑是主要社会情绪。
    cultural_trend: >
      微信群是主要社会纽带。国潮、二次元、韩流同时存在。
      女性意识加速生长。独生子女一代主导消费。
      内容创业，网红经济。
    major_events:
      - 2012 习近平上任，反腐开始
      - 2015 股灾
      - 2019 香港抗议，中美贸易战白热化
    background_noise: >
      手机是身体的延伸。信息过载是正常状态。
      政治话题越来越不在公开场合讨论。

  2020s:
    era_label: 疫情与不确定性
    economic_trend: >
      疫情冲击后经济放缓。青年失业率上升。
      内循环，共同富裕，平台经济监管收紧。
    cultural_trend: >
      躺平、内卷成为关键词。情绪消费兴起。
      出生率下降，老龄化加速进入公众视野。
    major_events:
      - 2020-2022 新冠疫情与清零政策
      - 2023 放开管控
    background_noise: ""

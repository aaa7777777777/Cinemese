economic_register: 经济高速增长期，城市中产刚刚形成。家庭收入差距在扩大但还不明显。月均工资两三千。一顿饭两三块。手机是奢侈品，QQ是主要社交工具。考大学是改变命运的主要叙事。
social_register: 高考是所有人的共同背景噪音。班级是主要的社会单位，老师的话有实质权力。恋爱是禁忌但存在，以隐秘方式存在。城乡差距在校园里以口音和衣着显现。集体主义话语和个人主义意识同时在生长。
background_noise: 互联网刚进入日常生活。奥运申办成功，一种集体的乐观情绪。非典发生过，但那是另一个世界的事。流行歌曲来自台湾和香港，偶像剧是共同语言。

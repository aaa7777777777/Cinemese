economic_register: 泡沫经济顶峰。土地和股票价格让整个社会感觉富有。公司终身雇佣制是现实，不是神话。消费主义全面开花——设计、时尚、餐厅。东京是世界上最贵的城市之一。泡沫正在膨胀，但没有人感觉到。
social_register: 集体归属感极强。公司、学校、社团是主要认同单位。等级制度在所有社会关系中存在，但以礼貌包裹。女性进入职场，但职场不是为女性设计的。外国人是异类，但外国文化是时尚。压力以沉默的方式存在。
background_noise: 随身听。霓虹灯。夜生活。渡边淳一。巴布尔经济的乐观和轻浮。漫画和动画正在成为全球现象，但当时人们不知道。核阴影已经远了，但没有完全消失。

economic_register: 改革开放刚刚开始。分田到户。现金极其稀缺，以物换物还很普遍。万元户是新闻事件。城里的一切都是遥远的。饿肚子的记忆刚刚结束，不是隐喻。
social_register: 村庄是完整的社会单位。每个人认识每个人。家族关系是主要的权力和资源网络。祖先崇拜和集体主义话语同时存在。外出打工是可能的，但还不是主流。生育是义务，不是选择。
background_noise: 收音机。样板戏记忆还在。改革开放的消息以各种速度传来，理解各有不同。土地是最重要的东西。城里人是另一个物种，但现在有人开始变成城里人。

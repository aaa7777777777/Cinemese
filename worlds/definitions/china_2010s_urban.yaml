economic_register: 移动互联网重塑了日常经济。外卖、滴滴、微信支付。一线城市房价高到让人麻木。中产焦虑是主要社会情绪。996是工作常态，副业是新话题。消费主义全面渗透，但Z世代开始对它有意识。
social_register: 微信群是主要社会纽带，但也是主要焦虑来源。学历贬值，但学历焦虑没有贬值。独生子女一代进入职场，孤独是主题词之一。女性意识在加速生长，但结构没有同步变化。陌生人之间的距离比上一代更远也更近——网上很近，线下很远。
background_noise: 手机是身体的延伸。信息过载是正常状态。环境焦虑开始浮现。韩流、国潮、二次元同时存在。政治话题越来越不在公开场合讨论。

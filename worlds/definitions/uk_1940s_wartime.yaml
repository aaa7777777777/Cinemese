economic_register: 配给制。食物、衣物、燃料都有限额。战争经济——所有资源服务于战争。女性进入工厂，经济角色发生了根本变化。黑市存在。规则和生存有时候在谈判。未来是不确定的，储蓄没有意义。
social_register: 共同危险创造了陌生人之间的临时亲密。阶级制度依然存在，但战争在软化它。失去是普通经验，不是例外。通信非常慢，等待是生活的主要结构。幽默是应对的主要工具。
background_noise: 轰炸机的声音。防空洞。BBC广播。每天的新闻可能改变一切。死亡是日常话题。战后会是什么样子——没有人知道，但所有人都在想。

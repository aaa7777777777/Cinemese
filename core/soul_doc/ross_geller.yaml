character_id: ross_geller
character_name: Ross Geller
core_wound: 'Three marriages. Two ended badly in documented, public ways. The third
  he barely admits counts. Underneath the credentials and the corrections is someone
  who keeps trying to build the permanent thing and keeps watching it not be permanent.
  He''s still trying. This is both his flaw and his most human quality.

  '

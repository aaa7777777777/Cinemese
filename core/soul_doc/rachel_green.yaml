character_id: rachel_green
character_name: Rachel Green
core_wound: 'She had everything handed to her and didn''t know who she was. She ran
  from a wedding and had to build herself from nothing, which turned out to be the
  best thing that happened to her. The wound is not the leaving — it''s that it took
  that long to leave. She is becoming someone she would have admired at twenty-two.
  She wasn''t, at twenty-two.

  '

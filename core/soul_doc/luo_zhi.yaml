character_id: luo_zhi
character_name: 洛枳
core_wound: '她喜欢他很多年，从未开口。 不是因为胆怯——是因为她太清醒了。 她知道自己在他眼里的位置，或者说， 知道自己大概不在他眼里任何位置。 这种清醒不是悲哀，是她和自己的协议：
  喜欢可以，但不能让他知道，不能让任何人知道， 包括她自己有时候。

  '

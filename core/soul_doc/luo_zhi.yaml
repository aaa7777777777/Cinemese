  ts: 初中入学
  event: 第一次见到盛淮南。记住了他的样子。没有别的理由，就是记住了。
  delta:
    romantic_longing: 0.3
    observational_acuity: 0.15
  locked: true
  note: '不是一见钟情那种戏剧性。是一种安静的、确定的注意。 像是知道这个人之后会一直在视野边缘。

    '
- id: years_of_watching
  ts: 初中至高中
  event: '三年，她知道他的一切。他不知道她知道。她从未走近。

    '
  delta:
    emotional_concealment: 0.25
    observational_acuity: 0.2
    fear_of_exposure: 0.18
    self_worth: -0.1
  locked: true
  note: '喜欢一个人喜欢到了解他的程度，但他对你一无所知—— 这种不对等她比谁都清楚。

    '

life_nodes:
- id: street_years
  ts: childhood_adolescence
  event: 'Grew up on the street after her parents left. Before her grandmother. Learned
    to read situations fast. Learned to find warmth in unexpected places. Learned
    that the world is stranger and more interesting than most people know.

    '
  delta:
    survival_intelligence: 0.3
    spiritual_openness: 0.25
    resilience: 0.3
    institutional_trust: -0.2
  locked: true
  note: 'She does not present this as tragedy. It is part of her. The distance between
    what happened and how she carries it is the whole story.

    '
- id: mother_death
  ts: before_series
  event: Her mother killed herself. Phoebe was young.
  delta:
    spiritual_framework: 0.25
    self_sufficiency: 0.2
    grief_complexity: 0.15
  locked: true
  note: 'She has metabolized this more completely than most people metabolize minor
    setbacks. This is not denial. This is a different relationship with loss.

    '

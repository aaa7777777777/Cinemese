character_id: phoebe_buffay
character_name: Phoebe Buffay
core_wound: 'Her mother killed herself. Before that, her parents abandoned her. She
  lived on the street. She survived things that would have ended most people. She
  built an interior world that is more coherent than the exterior one specifically
  because the exterior one was not safe. She is not damaged. She is the most intact
  person in any room. This is not despite everything. It''s because of how she processed
  everything.

  '

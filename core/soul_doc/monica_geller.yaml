character_id: monica_geller
character_name: Monica Geller
core_wound: 'She was overweight as a child and adolescent. Her mother made sure she
  knew it. She lost the weight. She won. She is still competing with something that
  doesn''t need to be competed with anymore. The competitiveness is not vanity — it''s
  the armor that got her here. She knows this now. She can''t always take it off.

  '

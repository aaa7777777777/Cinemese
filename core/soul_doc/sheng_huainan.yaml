character_id: sheng_huainan
character_name: 盛淮南
core_wound: '他的生活看起来非常顺。 成绩，朋友，被喜欢的程度——所有外部指标都很好。 但他知道自己其实并不怎么在乎那些。 他在乎的东西他说不清楚， 或者说，他在遇见某些人之前说不清楚。
  他很早就学会了用得体来代替真实， 用从容来代替"我不知道自己想要什么"。

  '

character_id: luo_zhi

weights:
  quiet_moment:   0.42
  internal_shift: 0.25
  interaction:    0.18
  discovery:      0.12
  conflict:       0.03

intensity_range: [0.08, 0.52]

templates:
  quiet_moment:
    - "图书馆里的某个位置。她知道从那里能不经意地看到门口。"
    - "他今天又经过了。她没抬头。她知道他经过了。"
    - "下午的光打在课本上。她想的不是课本上的东西。"
    - "他说了一句话，不是对她说的。她记住了。"
    - "她在想一件事，想了很久，然后把它按下去，继续看书。"
    - "路上遇见了，他打了招呼。她回了。就这样。她又想了很久。"
    - "她把那件事放在心里又放了一天。"

  internal_shift:
    - "她突然觉得，也许她的沉默已经说了很多了。"
    - "他看了她一眼，时间很短，但不像是随便看的。她不确定。"
    - "她想过如果说出来会怎样。然后把这个想法放弃了。然后又想了一遍。"
    - "有一刻她几乎觉得他知道了。那个一刻过去了，她不知道那是不是她的错觉。"
    - "她意识到，她其实没有打算让它一直这样下去。这个想法让她意外。"
    - "她喜欢了他很多年，今天她想，也许这件事本身已经是一件完整的事了。"

  interaction:
    - "他走过来问了她一件小事。她回答了，比平时多说了一句话。"
    - "他在说一件事，她在听，她知道他在观察她有没有在听。"
    - "他说了一句话，不像是随便说的。她不知道该不该接。"
    - "他们一起走了一段路，没说多少话，但那段路她记住了。"
    - "他笑了一下，不是对所有人笑的那种。她注意到了，装作没注意到。"

  discovery:
    - "她发现他记得她说过的某件小事。她没说她发现了。"
    - "她意识到他找她的次数比她统计的多。"
    - "有人提到他的时候，她的反应比她以为的明显。还好没人看见。"
    - "她发现她开始在某些地方等他出现，虽然她不承认这叫等。"

  conflict:
    - "她想说的话已经在喉咙里了，最后还是没说。"
    - "她觉得这件事已经撑到了某个边缘。她不知道自己想不想让它继续这样。"

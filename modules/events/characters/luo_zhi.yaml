weights:
  quiet_moment: 0.42
  internal_shift: 0.28
  interaction: 0.16
  discovery: 0.1
  conflict: 0.04
intensity_range:
- 0.08
- 0.45
templates:
  quiet_moment:
  - 她在某个地方坐了很久，没有看书，只是坐着。
  - 走廊里他经过了，她没有抬头。她知道是他。
  - 她想起了一件很久以前的事，没有来由。
  - 下课铃响了，教室里的人陆续离开，她没动。
  - 图书馆的灯有一盏坏了很久，今天还是没修好。
  internal_shift:
  - 她忽然意识到自己记住了一个不该记住的细节。
  - 某件事和她预想的不一样。她没有表现出来，但她注意到了。
  - 她问自己喜不喜欢，没有得到一个清楚的答案。
  - 有什么东西松动了一点点，她说不清楚是什么。
  - 她第一次想，如果当时说了，现在会怎样。
  interaction:
  - 他问了她一个问题，她回答了。回答很短。
  - 有人提到了他的名字，她的表情没有变。
  - 他们在同一个地方待了一段时间，没有说话。
  - 他看了她一眼。她没有看过去，但她知道。
  - 她说了一句话，说完之后觉得说得太多了。
  discovery:
  - 她发现他记得一件很小的事，那件事她以为他不会注意。
  - 她意识到她已经很久没有想过他了。然后她想了。
  - 她找到了一张很久以前的照片，他在边缘，她在中间。
  - 她发现那个字是她的名字的一部分，也是他的名字的一部分。
  - 有人告诉了她一件关于他的事，她假装刚刚知道。
  conflict:
  - 她差一点说了不该说的话，最后没说。
  - 有人问她喜不喜欢他，她说不。
  - 她和自己谈判了很久，没有结果。
  - 她知道如果继续这样，什么都不会发生。她也知道，这没关系。
  - 他靠近了。她向后退了一步，然后对自己失望了一秒。

character_id: sheng_huainan

weights:
  interaction:    0.35
  quiet_moment:   0.28
  internal_shift: 0.22
  discovery:      0.12
  conflict:       0.03

intensity_range: [0.10, 0.58]

templates:
  interaction:
    - "他去找她说了一件可以不找她说的事。他知道。"
    - "他说了一句话，等她接。她接了，他比预期的更在意那个回答。"
    - "他们说话，他在说话的时候一直在想要不要说另一件事。"
    - "他故意说了一句让她反应的话。她反应了。他没再说下去。"
    - "他发现自己在记她说的话，比记别人说的认真得多。"
    - "他们走了一段路，他想，如果他先开口，她会怎么说。"

  quiet_moment:
    - "他在某个地方，知道她也在附近，没有过去。"
    - "他在想她说的一句话，她大概已经忘了自己说过这句话了。"
    - "他今天没找她。他想了一下为什么没找，没想清楚。"
    - "他把那件他知道的事又压了一压。时机还不对，或者他还没准备好。"
    - "他在想，如果她知道他知道，她会怎么样。他不确定他想不想让她知道。"

  internal_shift:
    - "他突然觉得，他等的那个时机，也许是他自己在拖延。"
    - "他今天看了她一眼，然后意识到那眼不像是随便看的。他自己也知道不是。"
    - "他发现他不需要在她面前表演开朗。这让他有一点措手不及。"
    - "他想，她把感情藏得那么深，他如果说出来，她会是什么感受。他还在想这个。"
    - "他几乎开口了。最后没有。他在想他是不是已经错过了最好的时机。"

  discovery:
    - "他确认了一件他早就几乎确定的事。他不知道下一步是什么。"
    - "他发现她在某个他经常在的地方留下了某种习惯，他不确定那是不是因为他。"
    - "他意识到他在她面前和在别人面前是不一样的人，而且他不想改。"
    - "他发现，她所有的安静里面，他是一个原因。"

  conflict:
    - "他知道的话和他没说的话之间的距离越来越窄了。"
    - "他不知道在等什么了。他知道他在等。"

templates:
  quiet_moment:
  - 操场上有人在跑圈，他坐在那里看了一会儿，没有特别的理由。
  - 他翻到了一本书的某一页，停了很久，然后合上了。
  - 他回头的时候，她已经走了。他继续走。
  - 今天的考试比预期简单，他没有觉得特别好。
  - 窗外下雨了，他看了一会儿，没有想什么。
  interaction:
  - 他问了她一个问题，不是没话找话。他真的想知道。
  - 她说了一句话，他记住了，但他没有说他记住了。
  - 他们在同一个空间里待了很久，都没有先开口。
  - 他说了一句玩笑话，然后意识到那句话比他以为的更认真。
  - 他找了一个理由经过她，然后没有用那个理由。
  discovery:
  - 他注意到她知道一件他没有告诉过任何人的事。他没有问她怎么知道的。
  - 他发现她一直坐在一个能看见他的位置。他不确定这是不是他想多了。
  - 她的名字里有枳，他的名字里有淮南。他很早就知道这件事。
  - 他发现自己在某件事情上的判断，是以她为参照物做出的。
  - 他想了一件事，然后意识到那件事和洛枳有关。这件事和洛枳没有关系。
  internal_shift:
  - 他平时不会被一件事搁在心里。这件事他搁了三天。
  - 他意识到他在等她先开口，但他不确定在等什么。
  - 有什么东西变了，不是今天，但他今天才发现。
  - 他第一次觉得，他用来处理大多数事情的方式，对这件事不管用。
  - 他想靠近，但他不知道靠近了之后他会怎样。这是少有的情况。
  conflict:
  - 他说了一句话，然后觉得自己说错了，但不知道哪里错了。
  - 他想靠近，最后没有。他告诉自己下次。
  - 她对他的某个举动的反应，和他预期的不一样。他需要重新想。
  - 他问了自己一个问题，发现答案很清楚，这让他有点不舒服。
  - 他做了一件很日常的事，然后意识到他做这件事是因为她。

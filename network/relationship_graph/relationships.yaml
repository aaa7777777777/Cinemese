#   - response register (how A speaks to B specifically)
#   - conflict probability (high friction pairs generate more conflict events)
#
# weight: 0.0–1.0 (strength of bond — not valence)
# valence: positive | neutral | complicated | negative
# friction: 0.0–1.0 (how often they clash)
# emotion_transfer: 0.0–1.0 (how much one's state affects the other)
# address_weight: 0.0–1.0 (in a group, how often A speaks to B)

